{% set name = "isofit" %}
{% set version = "4.0.0" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/isofit-{{ version }}.tar.gz
  sha256: d64b54ac77aa90623585899fad658d370bd5c6f0f561e09a3d40e46542bc3594

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps -vv
  entry_points:
    - isofit = isofit.__main__:cli

requirements:
  host:
    - pip
    - python {{ python_min }}
    - hatchling
  run:
    - click
    - dask
    - h5py <=3.14.0
    - netCDF4 <1.7.4
    - numba
    - numpy >=1.20
    - pep8 >=1.7.1
    - pytest >=3.5.1
    - python >={{ python_min }}
    - python-build
    - python-xxhash >=1.2.0
    - pytorch
    - pyyaml >=5.1.2
    - ray-default
    - scikit-image >=0.17.0
    - scikit-learn >=0.19.1
    - scipy >=1.3.0
    - spectral >=0.19
    - twine
    - xarray
    - zarr >=3

test:
  imports:
    - isofit
  commands:
    - pip check
    - isofit --version
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/{{ name }}/{{ name }}
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  summary: Imaging Spectrometer Optimal FITting (ISOFIT)
  description: |
    ISOFIT contains a set of routines and utilities for fitting surface, 
    atmosphere and instrument models to imaging spectrometer data
  dev_url: https://github.com/{{ name }}/{{ name }}
  doc_url: https://github.com/{{ name }}/{{ name }}/wiki
  doc_source_url: https://github.com/{{ name }}/{{ name }}/tree/master/docs

extra:
  recipe-maintainers:
    - unbohn
    - pgbrodrick
    - davidraythompson
